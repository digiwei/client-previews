<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Digiwei Dashboard</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#8DC63F;--dark:#58595B;--blue:#29ABE2;
  --s-not-sent:#94a3b8;--s-pitched:#f59e0b;--s-replied:#29ABE2;
  --s-booked:#6366f1;--s-closed:#8DC63F;--s-lost:#ef4444;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --ind-plumber:#8DC63F;--ind-electric:#f59e0b;--ind-hvac:#29ABE2;
  --ind-handyman:#6366f1;--ind-contractor:#ec4899;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

/* LOGIN */
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dark);}
.login-card{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:320px;text-align:center;}
.login-logo{height:40px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;}
.login-logo img{height:40px;width:auto;}
.login-title{font-size:12px;color:var(--muted);margin-bottom:24px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;}
.login-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:10px;outline:none;}
.login-input:focus{border-color:var(--green);}
.login-btn{width:100%;background:var(--green);color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
.login-error{color:#ef4444;font-size:12px;margin-top:6px;display:none;}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* HEADER */
.header{background:var(--dark);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-logo{height:26px;display:flex;align-items:center;}
.header-logo img{height:100%;width:auto;}
.header-logo-text{color:#8DC63F;font-weight:900;font-size:15px;letter-spacing:1px;}
.header-right{display:flex;align-items:center;gap:12px;}
.header-date{font-size:11px;color:rgba(255,255,255,0.45);}
.logout-btn{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.12);padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;}

/* STATS — 6 stats, all visible */
.stats{background:#fff;border-bottom:1px solid var(--border);display:flex;flex-shrink:0;}
.stat{flex:1;text-align:center;padding:10px 4px 8px;border-right:1px solid var(--border);min-width:0;}
.stat:last-child{border-right:none;}
.stat-num{font-size:20px;font-weight:800;line-height:1;color:var(--dark);}
.stat-num.c-yellow{color:#f59e0b;}
.stat-num.c-blue{color:var(--blue);}
.stat-num.c-purple{color:#6366f1;}
.stat-num.c-green{color:var(--green);}
.stat-num.c-red{color:#ef4444;}
.stat-label{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;white-space:nowrap;}

/* TOOLBAR */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.search-wrap{position:relative;flex:1;min-width:0;}
.search-wrap input{width:100%;padding:6px 10px 6px 28px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;outline:none;background:#f8fafc;}
.search-wrap input:focus{border-color:var(--green);background:#fff;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none;}
/* Filter tabs — horizontally scrollable */
.filter-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex-shrink:0;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{padding:5px 10px;border-radius:5px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.ftab.active{background:var(--dark);color:#fff;border-color:var(--dark);}

/* TABLE */
.table-wrap{flex:1;overflow-y:auto;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead{position:sticky;top:0;z-index:10;background:#f8fafc;}
th{padding:6px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);white-space:nowrap;overflow:hidden;}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr{cursor:pointer;transition:background .1s;}
tr:hover td{background:#f8fafc;}
tr.selected td{background:#f0f9ff;}

/* Status-based left border on first cell */
tr.s-not-sent td:first-child{border-left:3px solid var(--s-not-sent);}
tr.s-pitched td:first-child{border-left:3px solid var(--s-pitched);}
tr.s-replied td:first-child{border-left:3px solid var(--s-replied);}
tr.s-booked td:first-child{border-left:3px solid var(--s-booked);}
tr.s-closed td:first-child{border-left:3px solid var(--s-closed);}
tr.s-lost td:first-child{border-left:3px solid var(--s-lost);}

/* Column widths */
.col-w-name{width:36%;}
.col-w-email{width:24%;}
.col-w-status{width:14%;}
.col-w-actions{width:26%;}

/* Industry dot */
.ind-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;flex-shrink:0;vertical-align:middle;}
.d-plumber{background:var(--ind-plumber);}
.d-electric{background:var(--ind-electric);}
.d-hvac{background:var(--ind-hvac);}
.d-handyman{background:var(--ind-handyman);}
.d-contractor{background:var(--ind-contractor);}

/* Name cell */
.name-line{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;display:flex;align-items:center;}
.name-sub{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.notes-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:5px;flex-shrink:0;}

/* Email cell */
.email-cell{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.email-cell.guessed{color:#f59e0b;}

/* Status badge */
.sbadge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.b-not-sent{background:#f1f5f9;color:#64748b;}
.b-pitched{background:#fef3c7;color:#92400e;}
.b-replied{background:#dbeafe;color:#1e40af;}
.b-booked{background:#ede9fe;color:#5b21b6;}
.b-closed{background:#dcfce7;color:#166534;}
.b-lost{background:#fee2e2;color:#991b1b;}

/* Action buttons — labeled */
.actions-cell{white-space:nowrap;display:flex;gap:4px;align-items:center;}
.abtn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:36px;height:32px;border-radius:6px;border:none;cursor:pointer;font-size:14px;text-decoration:none;gap:1px;transition:opacity .15s;flex-shrink:0;}
.abtn:hover{opacity:.75;}
.abtn-label{font-size:8px;font-weight:700;line-height:1;letter-spacing:.2px;}
.ab-call{background:#dcfce7;color:#166534;}
.ab-site{background:#dbeafe;color:#1e40af;}
.ab-video{background:#ede9fe;color:#5b21b6;}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}

/* PANEL */
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:100;}
.panel-overlay.open{display:block;}
.panel{position:fixed;right:0;top:0;bottom:0;width:340px;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,0.1);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease;}
.panel.open{transform:translateX(0);}
.panel-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:#f8fafc;flex-shrink:0;}
.panel-name{font-size:14px;font-weight:800;color:var(--dark);line-height:1.3;padding-right:8px;}
.panel-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.panel-close{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.panel-close:hover{background:var(--border);}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px;}

/* Pipeline bar */
.pipe-wrap{margin-bottom:16px;}
.pipe-label-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.pipe-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.pipe-lbl.active{color:var(--dark);}
.pipe-steps{display:flex;gap:3px;height:6px;}
.ps{flex:1;border-radius:3px;background:var(--border);}
.ps.done{background:var(--green);}
.ps.active{background:var(--blue);}

/* Panel actions */
.p-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px;}
.pbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 10px;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:opacity .15s;}
.pbtn:hover{opacity:.85;}
.pb-call{background:var(--green);color:#fff;}
.pb-zoom{background:#6366f1;color:#fff;}
.pb-site{background:var(--dark);color:#fff;}
.pb-vid{background:var(--blue);color:#fff;}

/* Info rows */
.p-section{margin-bottom:14px;}
.p-section-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.p-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start;}
.p-row-key{font-size:10px;font-weight:700;color:var(--muted);min-width:52px;padding-top:1px;}
.p-row-val{font-size:12px;color:var(--text);flex:1;word-break:break-all;}
.p-row-val a{color:var(--green);text-decoration:none;}

/* Status select */
.p-select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-weight:600;outline:none;margin-bottom:10px;background:#fff;}
.p-select:focus{border-color:var(--green);}

/* Notes */
.p-notes{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;height:80px;resize:none;font-family:inherit;background:#fff;}
.p-notes:focus{border-color:var(--green);}
.save-btn{width:100%;background:var(--green);color:#fff;border:none;padding:11px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;}
.save-btn:hover{opacity:.9;}

.hidden{display:none!important;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <img src="DigiWEI_logo.jpg" alt="Digiwei" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span style=\'color:#8DC63F;font-weight:900;font-size:20px;letter-spacing:1px;\'>digiWEI</span>')">
    </div>
    <div class="login-title">Campaign Dashboard</div>
    <input type="password" class="login-input" id="pwInput" placeholder="Enter password" onkeypress="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginErr">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div class="app hidden" id="app">

  <div class="header">
    <div class="header-logo">
      <img src="DigiWEI_logo.jpg" alt="Digiwei" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\'header-logo-text\'>digiWEI</span>')">
    </div>
    <div class="header-right">
      <div class="header-date" id="hDate"></div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Stats — all 6 visible -->
  <div class="stats">
    <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num c-yellow" id="sPitched">0</div><div class="stat-label">Pitched</div></div>
    <div class="stat"><div class="stat-num c-blue" id="sReplied">0</div><div class="stat-label">Replied</div></div>
    <div class="stat"><div class="stat-num c-purple" id="sBooked">0</div><div class="stat-label">Booked</div></div>
    <div class="stat"><div class="stat-num c-green" id="sClosed">0</div><div class="stat-label">Closed</div></div>
    <div class="stat"><div class="stat-num c-red" id="sLost">0</div><div class="stat-label">Lost</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="srch" placeholder="Search..." oninput="render()">
    </div>
    <div class="filter-tabs">
      <button class="ftab active" onclick="setFilter('all',this)">All</button>
      <button class="ftab" onclick="setFilter('not-sent',this)">Not Sent</button>
      <button class="ftab" onclick="setFilter('pitched',this)">Pitched</button>
      <button class="ftab" onclick="setFilter('replied',this)">Replied</button>
      <button class="ftab" onclick="setFilter('booked',this)">Booked</button>
      <button class="ftab" onclick="setFilter('closed',this)">Closed</button>
      <button class="ftab" onclick="setFilter('lost',this)">Lost</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <colgroup>
        <col class="col-w-name"><col class="col-w-email"><col class="col-w-status"><col class="col-w-actions">
      </colgroup>
      <thead>
        <tr>
          <th>Business</th>
          <th>Email</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty hidden" id="empty">No leads found</div>
  </div>
</div>

<!-- Panel -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-head">
    <div>
      <div class="panel-name" id="pName"></div>
      <div class="panel-sub" id="pSub"></div>
    </div>
    <button class="panel-close" onclick="closePanel()">&#10005;</button>
  </div>
  <div class="panel-body">

    <!-- Pipeline progress -->
    <div class="pipe-wrap">
      <div class="pipe-label-row">
        <span class="pipe-lbl" id="pl1">Not Sent</span>
        <span class="pipe-lbl" id="pl2">Pitched</span>
        <span class="pipe-lbl" id="pl3">Replied</span>
        <span class="pipe-lbl" id="pl4">Booked</span>
        <span class="pipe-lbl" id="pl5">Closed</span>
      </div>
      <div class="pipe-steps">
        <div class="ps" id="pp1"></div>
        <div class="ps" id="pp2"></div>
        <div class="ps" id="pp3"></div>
        <div class="ps" id="pp4"></div>
        <div class="ps" id="pp5"></div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="p-actions">
      <a class="pbtn pb-call" id="pCall" href="#">&#9742; Call Now</a>
      <a class="pbtn pb-zoom" href="https://calendly.com/digiwei/meet" target="_blank">&#128197; Book Zoom</a>
      <a class="pbtn pb-site" id="pSite" href="#" target="_blank">&#128279; Preview Site</a>
      <a class="pbtn pb-vid" id="pVid" href="#" target="_blank">&#9654; Watch Video</a>
    </div>

    <!-- Contact info -->
    <div class="p-section">
      <div class="p-section-label">Contact</div>
      <div class="p-row"><div class="p-row-key">Phone</div><div class="p-row-val" id="pPhone"></div></div>
      <div class="p-row"><div class="p-row-key">Email</div><div class="p-row-val" id="pEmail"></div></div>
      <div class="p-row"><div class="p-row-key">Website</div><div class="p-row-val" id="pWeb"></div></div>
      <div class="p-row"><div class="p-row-key">Rating</div><div class="p-row-val" id="pRating"></div></div>
    </div>

    <!-- Status -->
    <div class="p-section">
      <div class="p-section-label">Pipeline Status</div>
      <select class="p-select" id="pStatus">
        <option value="not-sent">Not Sent</option>
        <option value="pitched">Pitched</option>
        <option value="replied">Replied</option>
        <option value="booked">Call Booked</option>
        <option value="closed">Closed — Won</option>
        <option value="lost">Closed — Lost</option>
      </select>
    </div>

    <!-- Notes -->
    <div class="p-section">
      <div class="p-section-label">Notes</div>
      <textarea class="p-notes" id="pNotes" placeholder="Add notes about this lead..."></textarea>
    </div>

    <button class="save-btn" onclick="saveLead()">Save Changes</button>
  </div>
</div>

<script>
const PW = 'digiwei2026';
const PB = 'https://digiweipreview.com';
const VB = 'https://digiweipreview.com/videos';
const PIPE = ['not-sent','pitched','replied','booked','closed'];

let leads = [], ldata = {}, filter = 'all', curLead = null;

function slug(n){ return n.replace(/[^a-z0-9]/gi,'_').toLowerCase(); }
function pslug(n){ return n.replace(/[^a-z0-9]/gi,'-').toLowerCase().replace(/-+/g,'-').replace(/^-|-$/g,''); }
function ld(){ try{ ldata=JSON.parse(localStorage.getItem('dw_leads')||'{}'); }catch(e){ ldata={}; } }
function sd(){ localStorage.setItem('dw_leads',JSON.stringify(ldata)); }

function getStatus(l){
  const d=ldata[slug(l.name)];
  if(d&&d.status) return d.status;
  if(l.pitched) return 'pitched';
  return 'not-sent';
}

function statusLabel(s){ return {'not-sent':'Not Sent','pitched':'Pitched','replied':'Replied','booked':'Booked','closed':'Closed','lost':'Lost'}[s]||'Not Sent'; }
function badgeClass(s){ return {'not-sent':'b-not-sent','pitched':'b-pitched','replied':'b-replied','booked':'b-booked','closed':'b-closed','lost':'b-lost'}[s]||'b-not-sent'; }

function indDot(v){
  v=(v||'').toLowerCase();
  if(v.includes('plumb')) return '<span class="ind-dot d-plumber"></span>';
  if(v.includes('electric')) return '<span class="ind-dot d-electric"></span>';
  if(v.includes('hvac')||v.includes('heat')||v.includes('air')) return '<span class="ind-dot d-hvac"></span>';
  if(v.includes('handyman')) return '<span class="ind-dot d-handyman"></span>';
  return '<span class="ind-dot d-contractor"></span>';
}

function indLabel(v){
  v=(v||'').toLowerCase();
  if(v.includes('plumb')) return 'Plumber';
  if(v.includes('electric')) return 'Electrician';
  if(v.includes('hvac')||v.includes('heat')||v.includes('air')) return 'HVAC';
  if(v.includes('handyman')) return 'Handyman';
  return 'Contractor';
}

function updateStats(){
  document.getElementById('sTotal').textContent=leads.length;
  document.getElementById('sPitched').textContent=leads.filter(l=>['pitched','replied','booked','closed'].includes(getStatus(l))).length;
  document.getElementById('sReplied').textContent=leads.filter(l=>['replied','booked'].includes(getStatus(l))).length;
  document.getElementById('sBooked').textContent=leads.filter(l=>getStatus(l)==='booked').length;
  document.getElementById('sClosed').textContent=leads.filter(l=>getStatus(l)==='closed').length;
  document.getElementById('sLost').textContent=leads.filter(l=>getStatus(l)==='lost').length;
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const visible=leads.filter(l=>{
    const ms=filter==='all'||getStatus(l)===filter;
    const mq=!q||l.name.toLowerCase().includes(q)||(l.found_via||'').toLowerCase().includes(q)||(l.phone||'').includes(q);
    return ms&&mq;
  });

  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('empty');

  if(!visible.length){ tbody.innerHTML=''; empty.classList.remove('hidden'); updateStats(); return; }
  empty.classList.add('hidden');

  tbody.innerHTML=visible.map(l=>{
    const s=getStatus(l);
    const sl=slug(l.name);
    const ps=pslug(l.name);
    const d=ldata[sl]||{};
    const hasNotes=d.notes&&d.notes.trim().length>0;
    const phone=(l.phone||'').replace(/\D/g,'');

    return `<tr class="${s}" onclick="openPanel('${sl}')" id="row-${sl}">
      <td>
        <div class="name-line">${indDot(l.found_via)}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${l.name}</span>${hasNotes?'<span class="notes-dot"></span>':''}</div>
        <div class="name-sub">${indLabel(l.found_via)} &bull; ${l.phone||'No phone'}</div>
      </td>
      <td class="email-cell${l.emailGuessed?' guessed':''}" title="${l.email||''}">${l.email||'—'}</td>
      <td><span class="sbadge ${badgeClass(s)}">${statusLabel(s)}</span></td>
      <td onclick="event.stopPropagation()">
        <div class="actions-cell">
          <a class="abtn ab-call" href="tel:${phone}" title="Call"><span>&#9742;</span><span class="abtn-label">CALL</span></a>
          <a class="abtn ab-site" href="${PB}/${ps}.html" target="_blank" title="Preview Site"><span>&#128279;</span><span class="abtn-label">SITE</span></a>
          <a class="abtn ab-video" href="${VB}/${sl}.mp4" target="_blank" title="Watch Video"><span>&#9654;</span><span class="abtn-label">VIDEO</span></a>
        </div>
      </td>
    </tr>`;
  }).join('');

  if(curLead){
    const row=document.getElementById('row-'+slug(curLead.name));
    if(row) row.classList.add('selected');
  }
  updateStats();
}

function openPanel(sl){
  curLead=leads.find(l=>slug(l.name)===sl);
  if(!curLead) return;

  const d=ldata[sl]||{};
  const s=getStatus(curLead);
  const ps=pslug(curLead.name);

  document.getElementById('pName').textContent=curLead.name;
  document.getElementById('pSub').textContent=indLabel(curLead.found_via)+(curLead.googleRating?' · '+curLead.googleRating+'★ ('+curLead.googleReviews+' reviews)':'');
  document.getElementById('pCall').href='tel:'+(curLead.phone||'').replace(/\D/g,'');
  document.getElementById('pSite').href=PB+'/'+ps+'.html';
  document.getElementById('pVid').href=VB+'/'+sl+'.mp4';
  document.getElementById('pPhone').textContent=curLead.phone||'No phone';
  document.getElementById('pEmail').innerHTML=curLead.email?'<a href="mailto:'+curLead.email+'">'+curLead.email+'</a>':'—';
  document.getElementById('pWeb').innerHTML=curLead.website?'<a href="'+curLead.website+'" target="_blank">'+curLead.website+'</a>':'—';
  document.getElementById('pRating').textContent=curLead.googleRating?curLead.googleRating+'★ ('+curLead.googleReviews+' reviews)':'No data';
  document.getElementById('pStatus').value=s;
  document.getElementById('pNotes').value=d.notes||'';

  // Pipeline bar
  const idx=PIPE.indexOf(s);
  PIPE.forEach((_,i)=>{
    const el=document.getElementById('pp'+(i+1));
    const lbl=document.getElementById('pl'+(i+1));
    el.className='ps'+(i<idx?' done':i===idx?' active':'');
    lbl.className='pipe-lbl'+(i===idx?' active':'');
  });

  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.querySelectorAll('tr.selected').forEach(r=>r.classList.remove('selected'));
  const row=document.getElementById('row-'+sl);
  if(row) row.classList.add('selected');
}

function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('tr.selected').forEach(r=>r.classList.remove('selected'));
  curLead=null;
}

function saveLead(){

  const sl=slug(curLead.name);
  if(!ldata[sl]) ldata[sl]={};
  ldata[sl].status=document.getElementById('pStatus').value;
  ldata[sl].notes=document.getElementById('pNotes').value;
  ldata[sl].updated=new Date().toISOString();
  sd(); render(); closePanel();
}

  localStorage.removeItem('dw_auth');

}
